<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transacciones — Finanzas</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <header>
    <div><a href="/dashboard.html">💸 Finanzas — Transacciones</a></div>
    <div class="nav">
      <a href="/categories.html">Categorías</a>
      <a href="/payment-methods.html">Métodos de pago</a>
      <a class="active-link" href="/transactions.html">Transacciones</a>
      <a href="/budgets.html">Presupuestos</a>
      <a href="/reports.html">Reportes</a>
			<a href="/learning.html">Aprendizaje</a>
      <button class="secondary nav-logout" onclick="logout()">Salir</button>
    </div>
  </header>

  <div class="container tx-page">
    <h1>Transacciones</h1>

    <div class="grid">
      <!-- Formulario -->
      <div class="card tx-form">
        <h2>Nueva transacción</h2>

        <label>Fecha</label>
        <input type="date" id="txFecha" />

        <label>Monto</label>
        <input type="number" step="0.01" id="txMonto" />

        <label>Detalle</label>
        <input id="txDesc" />

        <label>Categoría</label>
        <select id="txCat"></select>

        <label>Método de pago</label>
        <select id="txPM"></select>

        <button class="primary" onclick="crear()">Registrar</button>
        <div id="msg" class="toast"></div>
      </div>

      <!-- Listado -->
      <div class="card">
        <h2>Listado</h2>
        <table id="tabla">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Detalle</th>
              <th>Categoría</th>
              <th>Método</th>
              <th>Monto</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal edición TX -->
  <div id="txModalOv" class="modal-overlay">
    <div class="modal">
      <header>
        <h2>Editar transacción</h2>
        <button onclick="closeTx()">✖</button>
      </header>
      <div>
        <label>Fecha</label>
        <input type="date" id="txEditFecha" />

        <label>Monto</label>
        <input type="number" step="0.01" id="txEditMonto" />

        <label>Descripción</label>
        <input id="txEditDesc" />

        <div id="txEditMsg" class="toast"></div>
      </div>
      <div class="actions">
        <button class="secondary" onclick="closeTx()">Cancelar</button>
        <button class="primary" onclick="guardarTx()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/common.js"></script>
</body>

</html>
